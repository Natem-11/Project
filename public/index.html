<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Login Page for CSC324 Homework 1" />

        <link rel="stylesheet" href="./css/styles.css" />

        <script type="module">
            import App from './js/login.js';
            new App();
        </script>
    </head>
    <body>
        <div class="login-wrapper">
            <main>
                <form id="login">
                    <img src="./images/logo.png" alt="Logo" class="logo" />
                    <div class="chat-container-login">
                    <div class="form-error hidden" id="error-message">
                        <p>Invalid Username or Password, please try again.</p>
                    </div>
                    <div class="form-element">
                        <label class="form-label" for="username">Username</label>
                        <input class="form-text" type="text" name="username" id="username" />
                    </div>
                    <div class="form-element">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-text" type="password" name="password" id="password" />
                    </div>
                    <div class="form-element">
                        <button class="login-button">Login</button>
                    </div>
                    <div class="sign-up">
                        <button class="sign-up-button" type="button" id="sign-up">Sign Up</button>
                    </div>             
                </div>
                </div>
                </form>
                
            </main>
        </div>
    </body>
</html>
