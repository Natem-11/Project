<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">

    <script type="module">
        import Settings from './js/settings.js';
        new Settings();
    </script>
</head>

<body>

    <nav>
        <ul>
            <li><a href="index.html">Chat</a></li>
            <li><a href="bugreport.html">Bug Report</a></li>
            <li><a href="rubix+.html">Rubix+</a></li>
            <li><a href="settings.html" class="active">Settings</a></li>
        </ul>
    </nav>

    <div class="settings-wrapper">
        <main>
            <h1>User Settings</h1>

            <form id="settings-form">

                <!-- PROFILE SECTION -->
                <section class="settings-section">
                    <h2>My Profile</h2>

                    <div class="form-element">
                        <label class="form-label" for="profile-picture">Profile Picture</label>
                        <input type="file" id="profile-picture" accept="image/*">
                    </div>

                    <div class="form-element">
                        <label class="form-label" for="username">Username</label>
                        <input class="form-text" type="text" id="username">
                    </div>
                </section>

                <!-- NOTIFICATION SETTINGS -->
                <section class="settings-section">
                    <h2>Notifications</h2>

                    <div class="form-element">
                        <label class="form-label">Enable Notifications</label>
                        <input type="checkbox" id="notifications-toggle">
                    </div>
                </section>

                <!-- BRIGHTNESS SETTINGS -->
                <section class="settings-section">
                    <h2>Brightness</h2>

                    <div class="form-element">
                        <label class="form-label" for="brightness">Screen Brightness</label>
                        <input type="range" id="brightness" min="10" max="100" value="70">
                    </div>
                </section>

                <div class="form-element">
                    <button class="form-button" type="submit">Save Settings</button>
                </div>

            </form>
        </main>
    </div>

</body>
</html>
